name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release artifact
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag against Cargo.toml
        shell: pwsh
        run: .\scripts\Assert-ReleaseTagMatchesVersion.ps1 -Tag "${{ github.ref_name }}"

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --locked

      - name: Validate release asset configuration
        shell: pwsh
        env:
          KOKORO_TTS_RELEASE_KOKORO_MODEL_URL: ${{ secrets.KOKORO_TTS_RELEASE_KOKORO_MODEL_URL }}
          KOKORO_TTS_RELEASE_ONNXRUNTIME_URL: ${{ secrets.KOKORO_TTS_RELEASE_ONNXRUNTIME_URL }}
          KOKORO_TTS_RELEASE_PIPER_WINDOWS_ZIP_URL: ${{ vars.KOKORO_TTS_RELEASE_PIPER_WINDOWS_ZIP_URL }}
        run: .\scripts\Assert-ReleaseAssetConfiguration.ps1 -Version "${{ github.ref_name }}"

      - name: Stage release assets
        shell: pwsh
        env:
          KOKORO_TTS_RELEASE_KOKORO_MODEL_URL: ${{ secrets.KOKORO_TTS_RELEASE_KOKORO_MODEL_URL }}
          KOKORO_TTS_RELEASE_ONNXRUNTIME_URL: ${{ secrets.KOKORO_TTS_RELEASE_ONNXRUNTIME_URL }}
          KOKORO_TTS_RELEASE_PIPER_WINDOWS_ZIP_URL: ${{ vars.KOKORO_TTS_RELEASE_PIPER_WINDOWS_ZIP_URL }}
        run: .\scripts\Stage-WindowsReleaseAssets.ps1 -Version "${{ github.ref_name }}"

      - name: Package Windows release archive
        shell: pwsh
        run: .\scripts\Package-WindowsRelease.ps1 -Version "${{ github.ref_name }}"

      - name: Run packaged readiness verification
        shell: pwsh
        run: .\scripts\Verify-Readiness.ps1 -Packaged

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-windows-x86_64.zip
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-sha256.txt

      - name: Verify published release assets
        shell: pwsh
        run: .\scripts\Test-PublishedRelease.ps1 -Version "${{ github.ref_name }}" -Repository "${{ github.repository }}"
