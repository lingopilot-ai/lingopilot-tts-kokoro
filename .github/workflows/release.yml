name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref_name:
        description: "Version tag to package (e.g. v0.1.0-rc-ci-test). Used only for staging/packaging; no release is published for dispatch runs."
        required: true
        default: "v0.1.0-rc-ci-test"

permissions:
  contents: write

jobs:
  release-artifact:
    name: ${{ matrix.label }} release artifact
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86_64
            os: windows-latest
            package_script: .\scripts\Package-WindowsRelease.ps1
            archive_suffix: windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag against Cargo.toml
        shell: pwsh
        run: .\scripts\Assert-ReleaseTagMatchesVersion.ps1 -Tag "${{ github.ref_name }}"

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --locked

      - name: Validate release asset configuration
        shell: pwsh
        run: .\scripts\Assert-ReleaseAssetConfiguration.ps1 -Version "${{ github.ref_name }}"

      - name: Stage release assets
        shell: pwsh
        run: .\scripts\Stage-WindowsReleaseAssets.ps1 -Version "${{ github.ref_name }}"

      - name: Package release archive
        shell: pwsh
        run: '& "${{ matrix.package_script }}" -Version "${{ github.ref_name }}"'

      - name: Run packaged readiness verification
        shell: pwsh
        timeout-minutes: 10
        run: .\scripts\Verify-Readiness.ps1 -Packaged -SkipLiveTests -SkipPackagedSmoke

      - name: Directive smoke gate (zero-arg ready line)
        shell: pwsh
        timeout-minutes: 2
        run: .\scripts\Test-ReleaseSmokeGate.ps1 -ZipPath "dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}"

      - name: Smoke test packaged archive
        shell: pwsh
        timeout-minutes: 5
        run: .\scripts\Test-WindowsReleaseArchive.ps1 -ZipPath "dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}"

      - name: Emit sibling .zip.sha256
        shell: pwsh
        run: |
          $zip = "dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}"
          $sibling = "$zip.sha256"
          $hash = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllBytes($sibling, [System.Text.Encoding]::ASCII.GetBytes($hash))

      - name: Verify sibling .zip.sha256 matches zip
        shell: pwsh
        run: |
          $zip = "dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}"
          $sibling = "$zip.sha256"
          if (-not (Test-Path $sibling)) { throw "Missing sibling checksum file: $sibling" }
          $expected = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          $actual = [System.IO.File]::ReadAllText($sibling).Trim().ToLower()
          if ($actual -ne $expected) { throw "Sibling checksum mismatch: expected=$expected actual=$actual" }
          if ($actual.Length -ne 64) { throw "Sibling checksum must be 64 hex chars, got length=$($actual.Length)" }

      - name: Install cargo-sbom
        shell: pwsh
        run: cargo install cargo-sbom --locked

      - name: Generate SPDX SBOM
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          cargo sbom --output-format spdx_json_2_3 | Out-File -FilePath "dist/lingopilot-tts-kokoro-${{ github.ref_name }}-sbom.spdx.json" -Encoding utf8

      - name: Publish GitHub Release assets
        if: ${{ !contains(github.ref_name, '-rc') }}
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-${{ matrix.archive_suffix }}.sha256
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-sha256.txt
            dist/lingopilot-tts-kokoro-${{ github.ref_name }}-sbom.spdx.json

      - name: Verify published release assets
        if: ${{ !contains(github.ref_name, '-rc') }}
        shell: pwsh
        timeout-minutes: 5
        run: .\scripts\Test-PublishedRelease.ps1 -Version "${{ github.ref_name }}" -Repository "${{ github.repository }}"
