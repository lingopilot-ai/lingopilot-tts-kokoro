# Public upstream URLs + SHA-256 checksums for Windows release assets.
# This file is the canonical source of truth for the release workflow — no
# repository secrets are required. Override any entry locally by exporting the
# matching KOKORO_TTS_RELEASE_*_URL environment variable; env overrides bypass
# this file entirely.
#
# SHA-256 fields are optional when the URL is overridden via env vars or
# derived at runtime (piper_windows). When a URL is loaded from this file and
# its sha256 is empty, staging emits a warning and skips verification.

[kokoro_model]
url = "https://github.com/lingopilot-ai/lingopilot-tts-kokoro/releases/download/kokoro-model-assets-v1.0/kokoro-model.zip"
sha256 = ""

[onnxruntime]
# Must match the API version the `ort` crate is built against (api-24 → ORT 1.24.x).
# 1.20.x DLLs only expose GetApi up to version 20 and cause ort::init_from to stall.
url = "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-1.24.4.zip"
sha256 = "d2319fddfb6ea4db99ccc4b60c85c517bcd855721f5daa6a06d40d7cb2ee2357"

[onnxruntime_linux_x64]
# Consumed by scripts/Stage-PosixReleaseAssets.ps1 on ubuntu-latest runners (E-02).
# Must match the API version the `ort` crate is built against (api-24 → 1.24.x).
url = "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz"
sha256 = "3a211fbea252c1e66290658f1b735b772056149f28321e71c308942cdb54b747"

[onnxruntime_macos_arm64]
# Consumed by scripts/Stage-PosixReleaseAssets.ps1 on macos-latest runners (E-02).
# Must match the API version the `ort` crate is built against (api-24 → 1.24.x).
url = "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-arm64-1.24.4.tgz"
sha256 = "93787795f47e1eee369182e43ed51b9e5da0878ab0346aecf4258979b8bba989"

[piper_windows]
# Leave url empty to derive from the current tag:
#   https://github.com/lingopilot-ai/lingopilot-tts-piper/releases/download/vX.Y.Z/lingopilot-tts-piper-vX.Y.Z-windows-x86_64.zip
# Override with KOKORO_TTS_RELEASE_PIPER_WINDOWS_ZIP_URL when needed.
url = ""
sha256 = ""
