name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  cargo:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
          - label: Linux
            os: ubuntu-latest
          - label: macOS
            os: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Assert forbidden crates are absent from Cargo.lock
        shell: pwsh
        run: .\scripts\Assert-ForbiddenCargoLockCrates.ps1

      - name: cargo check
        run: cargo check --locked

      - name: cargo test
        run: cargo test --locked
